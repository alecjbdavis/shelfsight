<head>

<title>Shelfsight — Competitor intelligence for UK independent beauty brands</title>

<style>
  :root {
    --cream: #F5F1EA;
    --cream-deep: #EEE7DA;
    --ink: #1A1410;
    --ink-soft: #3D342B;
    --taupe: #8A7F73;
    --wine: #7A2328;
    --wine-soft: #9B3135;
    --coral: #E8A87C;
    --hairline: rgba(26, 20, 16, 0.12);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: smooth; }

  body {
    font-family: 'Instrument Sans', -apple-system, sans-serif;
    background: var(--cream);
    color: var(--ink);
    font-size: 17px;
    line-height: 1.55;
    letter-spacing: -0.005em;
    -webkit-font-smoothing: antialiased;
    overflow-x: hidden;
  }

  .display {
    font-family: 'Fraunces', Georgia, serif;
    font-weight: 400;
    letter-spacing: -0.025em;
    line-height: 0.95;
  }

  .eyebrow {
    font-family: 'Instrument Sans', sans-serif;
    font-size: 12px;
    font-weight: 500;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: var(--taupe);
  }

  a { color: inherit; text-decoration: none; }

  .container {
    max-width: 1280px;
    margin: 0 auto;
    padding: 0 32px;
  }

  /* ---------------- NAV ---------------- */
  nav {
    position: sticky;
    top: 0;
    z-index: 50;
    background: var(--cream);
    border-bottom: 1px solid var(--hairline);
  }
  .nav-inner {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 22px 32px;
    max-width: 1280px;
    margin: 0 auto;
  }
  .logo {
    font-family: 'Fraunces', serif;
    font-weight: 500;
    font-size: 22px;
    letter-spacing: -0.02em;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .logo-dot {
    width: 10px;
    height: 10px;
    background: var(--wine);
    border-radius: 50%;
    display: inline-block;
  }
  .nav-links {
    display: flex;
    align-items: center;
    gap: 40px;
    font-size: 15px;
  }
  .nav-links a { color: var(--ink-soft); }
  .nav-links a:hover { color: var(--wine); }
  .btn {
    display: inline-block;
    padding: 12px 22px;
    background: var(--ink);
    color: var(--cream);
    border: none;
    border-radius: 4px;
    font-family: inherit;
    font-size: 15px;
    font-weight: 500;
    cursor: pointer;
    transition: background 0.2s;
  }
  .btn:hover { background: var(--wine); }
  .btn-ghost {
    background: transparent;
    color: var(--ink);
    border: 1px solid var(--ink);
    padding: 11px 22px;
  }
  .btn-ghost:hover { background: var(--ink); color: var(--cream); }

  /* ---------------- HERO ---------------- */
  .hero {
    padding: 90px 0 120px;
    position: relative;
  }
  .hero-grid {
    display: grid;
    grid-template-columns: 1.3fr 1fr;
    gap: 80px;
    align-items: end;
  }
  .hero-headline {
    font-size: clamp(54px, 8vw, 104px);
    color: var(--ink);
  }
  .hero-headline em {
    font-style: italic;
    color: var(--wine);
  }
